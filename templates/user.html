<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Monitor Recorder</title>
    <style>
        /* General page style */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fef8f2;
            /* soft cream */
            color: #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h2 {
            color: #6c5b7b;
            /* soft purple */
            margin-bottom: 30px;
            text-align: center;
        }

        /* Video preview */
        video {
            width: 480px;
            max-width: 90%;
            height: 360px;
            border-radius: 12px;
            border: 2px solid #d3c0f0;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            background-color: #e8eaf6;
            /* soft light blue when off */
            margin-bottom: 20px;
        }

        /* Buttons container */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Buttons style */
        button {
            background-color: #c1e1c1;
            /* mild green */
            color: #444;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #b0d9b0;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #e0e0e0;
            cursor: not-allowed;
            color: #999;
            box-shadow: none;
            transform: none;
        }

        /* Alert text */
        #alertText {
            color: #c94c4c;
            /* mild red */
            font-weight: bold;
            margin-top: 10px;
            min-height: 20px;
        }

        /* Container styling */
        .recorder-container {
            background-color: #fffdf8;
            padding: 30px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            color: #6c5b7b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #4e3c5c;
        }
    </style>
</head>

<body>
    <h2>Baby Monitor Recorder</h2>

    <div class="recorder-container">
        <video id="preview" autoplay muted></video>

        <div class="controls">
            <button id="toggleCameraBtn">Turn Off Camera</button>
            <button id="toggleAudioBtn">Mute Microphone</button>
            <button id="recordBtn">Start Recording 60 Seconds</button>
        </div>

        <div id="alertText"></div>
        <div class="controls">
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </div>

    <script>
        const preview = document.getElementById('preview');
        const recordBtn = document.getElementById('recordBtn');
        const toggleCameraBtn = document.getElementById('toggleCameraBtn');
        const toggleAudioBtn = document.getElementById('toggleAudioBtn');
        const alertText = document.getElementById('alertText');

        let mediaRecorder;
        let recordedChunks = [];
        let stream;
        let cameraOn = true;
        let audioOn = true;

        // Access camera and microphone
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(s => {
                stream = s;
                preview.srcObject = stream;

                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    recordedChunks = [];

                    const formData = new FormData();
                    formData.append('file', blob, 'recording.webm');

                    fetch('/upload', { method: 'POST', body: formData })
                        .then(res => res.text())
                        .then(data => alert('Upload complete: ' + data))
                        .catch(err => console.error(err));
                };
            })
            .catch(err => {
                console.error('Error accessing media devices:', err);
                alert('Could not access camera or microphone.');
            });

        // Toggle Camera
        toggleCameraBtn.onclick = () => {
            if (!stream) return;
            cameraOn = !cameraOn;
            stream.getVideoTracks().forEach(track => track.enabled = cameraOn);
            toggleCameraBtn.textContent = cameraOn ? "Turn Off Camera" : "Turn On Camera";
        };

        // Toggle Audio
        toggleAudioBtn.onclick = () => {
            if (!stream) return;
            audioOn = !audioOn;
            stream.getAudioTracks().forEach(track => track.enabled = audioOn);
            toggleAudioBtn.textContent = audioOn ? "Mute Microphone" : "Unmute Microphone";
        };

        // Start Recording
        recordBtn.onclick = () => {
            if (!mediaRecorder) return;

            if (!cameraOn) {
                alertText.textContent = "Cannot record: Camera is turned off!";
                return;
            }

            if (!audioOn) {
                alertText.textContent = "Cannot record: Microphone is muted!";
                return;
            }

            alertText.textContent = "";
            mediaRecorder.start();
            recordBtn.disabled = true;
            setTimeout(() => {
                mediaRecorder.stop();
                recordBtn.disabled = false;
            }, 60000);
        };
    </script>
</body>

</html>
